# CI: build, test, format and clippy on every push and PR.
#
# Runs only on windows-latest because ArcThumb is a Windows shell
# extension and there is no point compiling it elsewhere.
#
# Clippy is intentionally NOT failing on warnings (no `-D warnings`).
# Tighten this once the codebase is warning-clean.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid spending CI minutes on stale pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Test (debug)
        run: cargo test

      - name: Build (release)
        run: cargo build --release
